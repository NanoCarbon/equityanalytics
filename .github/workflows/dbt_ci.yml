name: dbt CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - 'dbt_project/**'
      - 'dbt_project.yml'
  push:
    branches: [main]
    paths:
      - 'dbt_project/**'
      - 'dbt_project.yml'

jobs:
  dbt-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Write private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_key.p8

      - name: Configure dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          equity_analytics:
            target: ${{ github.event_name == 'push' && 'prod' || 'ci' }}
            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                private_key_path: /tmp/snowflake_key.p8
                role: ACCOUNTADMIN
                database: EQUITY_ANALYTICS
                warehouse: TRANSFORM_WH
                schema: CI_${{ github.event.pull_request.number }}
                threads: 4
              prod:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                private_key_path: /tmp/snowflake_key.p8
                role: ACCOUNTADMIN
                database: EQUITY_ANALYTICS
                warehouse: TRANSFORM_WH
                schema: MARTS
                threads: 4
          EOF

      - name: Run dbt build
        run: |
          dbt deps --profiles-dir ~/.dbt
          dbt build --profiles-dir ~/.dbt

      - name: Cleanup CI schema
        if: github.event_name == 'pull_request'
        run: |
          pip install snowflake-connector-python cryptography --quiet
          python << 'PYEOF'
          import snowflake.connector
          from cryptography.hazmat.primitives.serialization import (
              load_pem_private_key, Encoding, PrivateFormat, NoEncryption
          )

          with open('/tmp/snowflake_key.p8', 'rb') as f:
              private_key = load_pem_private_key(f.read(), password=None)

          private_key_bytes = private_key.private_bytes(
              encoding=Encoding.DER,
              format=PrivateFormat.PKCS8,
              encryption_algorithm=NoEncryption()
          )

          conn = snowflake.connector.connect(
              user='${{ secrets.SNOWFLAKE_USER }}',
              account='${{ secrets.SNOWFLAKE_ACCOUNT }}',
              private_key=private_key_bytes,
              role='ACCOUNTADMIN',
              database='EQUITY_ANALYTICS'
          )

          schema = 'CI_${{ github.event.pull_request.number }}'
          conn.cursor().execute(f'DROP SCHEMA IF EXISTS EQUITY_ANALYTICS.{schema}')
          conn.close()
          print(f'Dropped {schema}')
          PYEOF