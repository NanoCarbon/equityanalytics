version: 2

models:
  - name: fact_daily_prices
    description: "Daily price and return metrics per security. Grain: ticker + price_date."
    columns:
      - name: ticker
        tests:
          - not_null
      - name: price_date
        tests:
          - not_null
      - name: close_price
        tests:
          - not_null
      - name: daily_return
        tests:
          - not_null
      - name: volume
        tests:
          - not_null

  - name: dim_security
    description: "One row per unique security with company metadata."
    columns:
      - name: ticker
        tests:
          - not_null
          - unique
      - name: sector
        tests:
          - not_null

  - name: dim_date
    description: "Calendar dimension spanning 2009 to present."
    columns:
      - name: date_key
        tests:
          - not_null
          - unique
      - name: year
        tests:
          - not_null
      - name: is_weekday
        tests:
          - not_null

  - name: fact_fundamentals
    description: >
      Pivoted financial statement data. Grain: ticker + period_end_date + frequency.
      Contains income statement, balance sheet, and cash flow line items as columns.
    columns:
      - name: ticker
        tests:
          - not_null
      - name: period_end_date
        tests:
          - not_null
      - name: frequency
        tests:
          - not_null
          - accepted_values:
              values: ['annual', 'quarterly']

  - name: fact_valuation_snapshot
    description: >
      Point-in-time valuation ratios and metrics. Grain: ticker + snapshot_date.
      Daily snapshots enable time-series analysis of PE, margins, etc.
    columns:
      - name: ticker
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null
