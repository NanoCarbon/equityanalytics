name: AI Code Review

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  issues: write
  contents: read   # needed to read the diff via GitHub API

jobs:
  code-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic python-dotenv requests

      - name: Run code review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GITHUB_TOKEN is automatically provisioned by Actions.
          # Passed explicitly so the Python script can read it as an env var.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_EVENT_PATH and GITHUB_REPOSITORY are set automatically
          # by Actions — no need to pass them explicitly, but documented here
          # so it's clear the script depends on them.
          # GITHUB_EVENT_PATH: /home/runner/work/_temp/_github_workflow/event.json
          # GITHUB_REPOSITORY: NanoCarbon/equityanalytics
        run: python agents/code_reviewer.py

      - name: Post review as PR comment
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('code_review.md', 'utf8');
            const truncated = review.length > 65000
              ? review.substring(0, 65000) + '\n\n... (truncated)'
              : review;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: truncated
            });